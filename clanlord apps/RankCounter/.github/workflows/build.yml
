name: Build RCXX Cross-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect latest rcXX.py
        id: detect
        shell: bash
        run: |
          PYFILE=$(ls rc*.py | sort -V | tail -n 1)
          if [ -z "$PYFILE" ]; then
            echo "No rcXX.py file found!"
            exit 1
          fi
          VERSION_NUM=$(echo "$PYFILE" | sed -E 's/rc([0-9]+)\.py/\1/')
          echo "pyfile=$PYFILE" >> $GITHUB_OUTPUT
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      # -------------------------
      # WINDOWS BUILD
      # -------------------------
      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --icon=phoenix.png ^
            --add-data "phoenix.png;." ^
            --add-data "rankmessages.txt;." ^
            --add-data "trainers.txt;." ^
            --add-data "specialphrases.txt;." ^
            ${{ steps.detect.outputs.pyfile }}

      # -------------------------
      # MAC + LINUX BUILD
      # -------------------------
      - name: Build macOS/Linux binary
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --icon=phoenix.png \
            --add-data "phoenix.png:." \
            --add-data "rankmessages.txt:." \
            --add-data "trainers.txt:." \
            --add-data "specialphrases.txt:." \
            ${{ steps.detect.outputs.pyfile }}

      # -------------------------
      # APPIMAGE BUILD (LINUX ONLY)
      # -------------------------
      - name: Install AppImage tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y appstream
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x appimager.sh
          ./appimager.sh

      # -------------------------
      # UPLOAD ARTIFACTS
      # -------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-v${{ steps.detect.outputs.version }}
          path: |
            dist/
            *.AppImage

  # ---------------------------------------------------
  # RELEASE JOB
  # ---------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "RC${{ needs.build.outputs.version }} Release"
          files: builds/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
